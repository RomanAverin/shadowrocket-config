name: Generate Config

on:
  push:
    branches:
      - main
    paths:
      - '*.list'
      - 'config/conf.template'
      - 'scripts/generate_conf.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate list files and generate config
        run: python scripts/generate_conf.py

      - name: Upload to Yandex Cloud S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp rules_for_ru_bypass.conf \
            s3://shadowrocket/rules_for_ru_bypass.conf \
            --endpoint-url https://storage.yandexcloud.net \
            --region ru-central1
