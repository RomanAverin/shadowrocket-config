name: Generate Config

on:
  push:
    branches:
      - main
    paths:
      - '*.list'
      - 'config/conf.template'
      - 'scripts/generate_conf.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  S3_ENDPOINT: https://storage.yandexcloud.net
  S3_BUCKET: s3://shadowrocket
  S3_REGION: ru-central1

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate list files and generate config
        run: python scripts/generate_conf.py

      - name: Download external list files
        run: |
          curl -fsSL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Apple/Apple.list" \
            -o Apple.list
          curl -fsSL "https://raw.githubusercontent.com/Master-Yoba/shadowrocket-rules/release/rules-geosite/geosite-category-ru.list" \
            -o geosite-category-ru.list
          curl -fsSL "https://raw.githubusercontent.com/Master-Yoba/shadowrocket-rules/release/rules-geoip/geoip-ru.list" \
            -o geoip-ru.list

      - name: Upload all files to Yandex Cloud S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp rules_for_ru_bypass.conf ${{ env.S3_BUCKET }}/rules_for_ru_bypass.conf \
            --endpoint-url ${{ env.S3_ENDPOINT }} --region ${{ env.S3_REGION }}
          for f in REJECT.list DIRECT.list NORU.list RUSSIA.list GOOGLE.list \
                   Apple.list geosite-category-ru.list geoip-ru.list; do
            aws s3 cp "$f" "${{ env.S3_BUCKET }}/$f" \
              --endpoint-url ${{ env.S3_ENDPOINT }} --region ${{ env.S3_REGION }}
          done
